<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrithviAds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0A0A0A;
      color: #F5F5F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    .header {
      background: #FF6B2B;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #fff;
    }
    .header-text h1 { font-size: 15px; font-weight: 800; color: #fff; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }

    .body { padding: 16px; }

    .current-site {
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .site-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .site-name { font-size: 13px; font-weight: 700; color: #F5F5F5; }

    .deal-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .deal-top {
      padding: 12px 14px;
      border-bottom: 1px solid #1a1a1a;
    }
    .deal-brand { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
    .deal-desc { font-size: 12px; color: #A0A0A0; line-height: 1.4; }
    .deal-code-row {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .deal-code {
      font-size: 15px; font-weight: 900; color: #FF6B2B; letter-spacing: 0.12em;
      background: #0A0A0A; border: 1px dashed #FF6B2B;
      padding: 5px 12px; border-radius: 8px;
    }
    .deal-discount {
      font-size: 12px; font-weight: 700; color: #22C55E;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary { background: #FF6B2B; color: #fff; margin-bottom: 8px; }
    .btn-primary:hover { background: #E5541A; }
    .btn-secondary {
      background: transparent;
      color: #A0A0A0;
      border: 1px solid #2A2A2A;
    }
    .btn-secondary:hover { border-color: #FF6B2B; color: #FF6B2B; }

    .no-deals {
      text-align: center;
      padding: 28px 16px;
    }
    .no-deals-icon { font-size: 36px; margin-bottom: 10px; }
    .no-deals h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .no-deals p { font-size: 12px; color: #666; line-height: 1.5; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #222;
      border-top-color: #FF6B2B;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: #666; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #161616;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left { font-size: 10px; color: #444; }
    .footer-right a { font-size: 10px; color: #FF6B2B; text-decoration: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(34,197,94,0.1);
      color: #22C55E;
      border: 1px solid rgba(34,197,94,0.2);
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div class="header-text">
      <h1>PrithviAds</h1>
      <p>Smart Coupon Assistant</p>
    </div>
  </div>

  <div class="body">
    <div class="current-site">
      <span>🌐</span>
      <div>
        <div class="site-label">Current Site</div>
        <div class="site-name" id="site-name">Loading...</div>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Checking for deals...</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-left">© PrithviAds 2024</span>
    <a href="https://your-prithviads-domain.com" target="_blank">Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
